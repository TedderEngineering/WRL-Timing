version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: racetrace-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: racetrace_dev
      POSTGRES_PASSWORD: devpassword123
      POSTGRES_DB: racetrace_dev
    volumes:
      - racetrace_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U racetrace_dev -d racetrace_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  racetrace_pgdata:
